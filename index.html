<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FireLink</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, sans-serif;
      background: #1a1a2e;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }
    #subtitle {
      font-size: 13px;
      color: #aaa;
      margin-bottom: 30px;
    }
    #nameSection {
      width: 100%;
      max-width: 320px;
      margin-bottom: 24px;
      text-align: center;
    }
    #nameSection input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid #444;
      background: #16213e;
      color: white;
      font-size: 16px;
      margin-bottom: 10px;
    }
    #nameSection button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #0f3460;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
    #responderLabel {
      font-size: 14px;
      color: #aaa;
      margin-bottom: 24px;
    }
    #responderLabel span {
      color: #00ff88;
      font-weight: bold;
    }
    #manualBtn {
      background: #c0392b;
      color: white;
      border: none;
      padding: 28px 32px;
      font-size: 26px;
      font-weight: bold;
      border-radius: 20px;
      cursor: pointer;
      width: 280px;
      margin-bottom: 20px;
      letter-spacing: 1px;
    }
    #manualBtn:active { background: #922b21; }
    #clearBtn {
      background: #2c3e50;
      color: #aaa;
      border: none;
      padding: 12px 24px;
      font-size: 14px;
      border-radius: 10px;
      cursor: pointer;
      margin-bottom: 30px;
    }
    #status {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 8px;
      text-align: center;
    }
    #timestamp {
      font-size: 13px;
      color: #aaa;
      margin-bottom: 24px;
      text-align: center;
    }
    #log {
      width: 100%;
      max-width: 360px;
      font-size: 13px;
    }
    #log h3 {
      color: #aaa;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }
    .log-entry {
      background: #16213e;
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 8px;
      border-left: 3px solid #c0392b;
    }
    .log-name { font-weight: bold; font-size: 14px; }
    .log-time { color: #aaa; font-size: 12px; margin-top: 2px; }
  </style>
</head>
<body>
  <h1>🔴 FireLink</h1>
  <div id="subtitle">Patient Contact System</div>

  <div id="nameSection">
    <input type="text" id="nameInput" placeholder="Enter your name" />
    <button onclick="saveName()">Save My Name</button>
  </div>

  <div id="responderLabel">Responder: <span id="responderName">Not set</span></div>

  <button id="manualBtn" onclick="manualContact()">🚨 PT CONTACT</button>
  <button id="clearBtn" onclick="clearContact()">Clear</button>

  <div id="status">Awaiting call...</div>
  <div id="timestamp"></div>

  <div id="log">
    <h3>Recent contacts</h3>
    <div id="logEntries"></div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
